<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DriveCars Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>DriveCars Calculator</h2>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('usa')">США</button>
    <button class="tab" onclick="switchTab('eu')">Європа</button>
  </div>

  <!-- USA -->
  <div id="usa" class="card">
    <div class="select-wrapper">
      <div class="select" id="stateSelect">Обери штат</div>
      <div class="variables" id="stateList"></div>
    </div>

    <input id="usa_price" placeholder="Ціна авто $">
    <input id="usa_engine" placeholder="Об'єм двигуна">
    <input id="usa_year" placeholder="Рік">

    <select id="usa_fuel">
      <option value="0">Бензин</option>
      <option value="1">Дизель</option>
      <option value="2">Електро</option>
    </select>

    <button onclick="calcUSA()">Розрахувати</button>
    <div id="usa_result"></div>
  </div>

  <!-- EU -->
  <div id="eu" class="card hidden">
    <input id="eu_price" placeholder="Ціна авто €">
    <input id="eu_engine" placeholder="Об'єм двигуна">
    <input id="eu_year" placeholder="Рік">

    <select id="eu_fuel">
      <option value="0">Бензин</option>
      <option value="1">Дизель</option>
      <option value="2">Електро</option>
    </select>

    <button onclick="calcEU()">Розрахувати</button>
    <div id="eu_result"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
